name: Release

# Builds a Developer ID-signed, notarized, stapled Clipmunk.dmg.
# - workflow_dispatch: full build + notarize, DMG uploaded as an artifact (no release).
# - push tag v*: same, plus the DMG is attached to the GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-26
    # Hard ceiling so a stalled Apple Notary service can never burn the full
    # 6-hour default again. A healthy run (build + MLX gate + 2 notarizations) is
    # well under this; during an Apple Notary stall the job fails at the first
    # notarize once notarize.sh's NOTARIZE_DEADLINE_MIN (45m) elapses, which fits
    # under this ceiling even with a cold model cache.
    timeout-minutes: 150
    env:
      APP_NAME: Clipmunk
      SCHEME: Clipmunk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain versions
        run: xcodebuild -version

      - name: Install build tools
        run: brew install xcodegen create-dmg

      - name: Ensure Metal Toolchain (Xcode 26 unbundles it; MLX needs it)
        run: |
          if ! xcodebuild -showComponent MetalToolchain 2>/dev/null | grep -q "installed"; then
            xcodebuild -downloadComponent MetalToolchain
          fi

      - name: Import Developer ID cert into a temporary keychain
        env:
          DEVID_CERT_P12_BASE64: ${{ secrets.DEVID_CERT_P12_BASE64 }}
          DEVID_CERT_PASSWORD: ${{ secrets.DEVID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/clipmunk.keychain-db"
          KPW="$(uuidgen)"
          echo "$DEVID_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$DEVID_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache the MLX-gate model (Hugging Face hub)
        # The MLX launch gate downloads the Gemma E2B Director (~1.5 GB) on first
        # run; cache it so later runs restore in seconds and leave more of the job
        # budget for notarization. Saved even when a later step fails, so a healthy
        # download survives a transient Apple Notary outage.
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-mlx-gate-${{ hashFiles('Clipmunk/Services/ModelCatalog.swift', 'Clipmunk/Services/ChatModelProfile.swift') }}
          restore-keys: |
            hf-mlx-gate-

      - name: Build (Release, Developer ID, hardened runtime)
        run: |
          set -euo pipefail
          # On a v* tag, stamp the shipped version from the tag (v1.2.3 -> 1.2.3,
          # build number = the CI run number). On workflow_dispatch (ref is a
          # branch) keep project.yml's MARKETING_VERSION. Values are digits/dots
          # only, so unquoted word-splitting of $VERSION_ARGS is safe.
          VERSION_ARGS=""
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # v0.1.0 -> 0.1.0 ; v0.1.0-rc1 -> 0.1.0 (keep CFBundleShortVersionString
            # a clean 3-component version; the full tag is the release name).
            V="${GITHUB_REF_NAME#v}"; V="${V%%-*}"
            VERSION_ARGS="MARKETING_VERSION=$V CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER"
          fi
          xcodebuild -project Clipmunk.xcodeproj -scheme "$SCHEME" -configuration Release \
            -derivedDataPath build -skipMacroValidation -skipPackagePluginValidation \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            HF_DOWNLOAD_TOKEN="${{ secrets.HF_DOWNLOAD_TOKEN }}" \
            $VERSION_ARGS \
            clean build
          APP="build/Build/Products/Release/$APP_NAME.app"
          codesign --verify --strict --verbose=2 "$APP"
          # Guard 1 (structural): the precompiled MLX Metal kernels must be in the
          # bundle, or every MLX op (Gemma Director + mandatory Marlin vision)
          # crashes at runtime. Notary can't see this — it's a launch-time failure.
          find "$APP" -name '*.metallib' | grep -q . \
            || { echo "::error::no .metallib in app bundle — Metal Toolchain missing at build time?"; exit 1; }
          # Guard 2 (signing invariant): get-task-allow must be ABSENT — Apple's
          # notary rejects it, and it weakens the hardened runtime if it slips in.
          codesign -d --entitlements :- "$APP" 2>/dev/null > /tmp/ents.plist || true
          if grep -q 'get-task-allow' /tmp/ents.plist; then
            echo "::error::get-task-allow present in entitlements — would fail notarization"; exit 1
          fi
          # Guard 3 (gated-model access): the mandatory Marlin-2B vision repo is
          # gated on Hugging Face, so the app needs an embedded read token. Verify
          # the token was baked into the bundle AND that it actually grants Marlin
          # access — this is the exact failure (anonymous 401) that shipped in v0.1.0.
          TOK="$(/usr/libexec/PlistBuddy -c 'Print :HFDownloadToken' "$APP/Contents/Info.plist" 2>/dev/null || true)"
          if [ -z "$TOK" ]; then
            echo "::error::no HFDownloadToken embedded — set the HF_DOWNLOAD_TOKEN secret; the gated Marlin-2B download will 401"; exit 1
          fi
          MARLIN_CODE="$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOK" \
            'https://huggingface.co/junwatu/Marlin-2B-MLX-8bit/resolve/main/chat_template.jinja')"
          if [ "$MARLIN_CODE" != "200" ]; then
            echo "::error::embedded token cannot access gated Marlin-2B (HTTP $MARLIN_CODE) — token invalid or lacks access"; exit 1
          fi
          echo "==> embedded HF token grants Marlin-2B access (HTTP 200)"

      - name: MLX launch gate (signed+hardened Director must actually infer)
        # Notarization proves the app is *signed* correctly — NOT that it *runs*.
        # The real out-of-the-gate risk is an MLX/Metal/library-validation crash
        # on first inference under hardened runtime. director-probe loads the real
        # Gemma 4 E2B Director (MLX) headlessly and runs one moment-find pass; we
        # build it with the SAME Developer ID + hardened-runtime signing as the app
        # so a runtime failure fails the release here, before anything is published.
        # (`open`-ing the app would be a false green: every model loads lazily, so
        # nothing touches Metal at launch.)
        run: |
          set -euo pipefail
          # Reuses the MLX deps already compiled in the app build (same derivedData).
          xcodebuild -project Clipmunk.xcodeproj -scheme director-probe -configuration Release \
            -derivedDataPath build -skipMacroValidation -skipPackagePluginValidation \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            build
          PROBE="build/Build/Products/Release/director-probe"
          codesign --verify --strict "$PROBE"
          # Run the real Gemma E2B (MLX) inference under hardened runtime. Downloads
          # the model (~1.5 GB) once from Hugging Face — this is exactly the
          # "models download on first use" path the release must work on. One retry
          # absorbs a transient Hugging Face hiccup; a real crash still fails.
          ok=
          for attempt in 1 2; do
            if "$PROBE" 2>&1 | tee /tmp/director.txt && grep -q 'FINDMOMENTS_OK' /tmp/director.txt; then
              ok=1; break
            fi
            echo "==> director-probe attempt ${attempt} did not reach FINDMOMENTS_OK; retrying in 15s"
            sleep 15
          done
          [ -n "$ok" ] || { echo "::error::director-probe never reached FINDMOMENTS_OK — MLX path broken under hardened runtime"; exit 1; }
          # FINDMOMENTS_OK already proves MLX inferred under hardened runtime (a kill
          # would have prevented it). Surface any hard-crash log lines for diagnostics,
          # but don't fail on them — they'd only be false positives at this point.
          log show --last 10m --predicate 'process == "director-probe"' 2>/dev/null \
            | grep -iE 'EXC_BAD|EXC_CRASH|Killed:|library validation failed' || true
          echo "==> MLX launch gate passed: signed+hardened Director inferred successfully"

      - name: Notarize and staple the app
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/$APP_NAME.app"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/$APP_NAME.zip"
          # Robust: per-attempt --timeout + retries (see scripts/notarize.sh) so an
          # Apple Notary stall fails fast and resubmits instead of hanging the job.
          bash scripts/notarize.sh "$RUNNER_TEMP/$APP_NAME.zip"
          xcrun stapler staple "$APP"

      - name: Build and sign the DMG
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/$APP_NAME.app"
          mkdir -p dist
          # create-dmg can exit nonzero on AppleScript timing even on success → retry, then check the file.
          for i in 1 2 3; do
            create-dmg --volname "Clipmunk" --volicon "assets/Clipmunk.icns" \
              --window-size 540 380 --icon-size 110 \
              --icon "$APP_NAME.app" 150 190 --app-drop-link 390 190 --hdiutil-quiet \
              "dist/$APP_NAME.dmg" "$APP" && break || sleep 5
          done
          test -f "dist/$APP_NAME.dmg"
          codesign --force --sign "Developer ID Application" --timestamp "dist/$APP_NAME.dmg"

      - name: Notarize and staple the DMG
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          bash scripts/notarize.sh "dist/$APP_NAME.dmg"
          xcrun stapler staple "dist/$APP_NAME.dmg"

      - name: Verify notarization
        run: |
          set -euo pipefail
          # A real Gatekeeper assessment must PASS — don't swallow a rejection.
          spctl -a -t open --context context:primary-signature -vvv "dist/$APP_NAME.dmg" 2>&1 | tee /tmp/spctl.txt
          grep -q ': accepted' /tmp/spctl.txt
          xcrun stapler validate "dist/$APP_NAME.dmg"

      - name: Upload DMG artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Clipmunk-dmg
          path: dist/Clipmunk.dmg
          if-no-files-found: ignore

      - name: Publish the signed DMG as a GitHub Release
        # Every v* tag publishes a Release with the notarized DMG attached.
        # Pre-release (-rc/-beta/…) tags are marked as prereleases; final vX.Y.Z tags are full releases.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Clipmunk.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Clipmunk — long videos → vertical shorts, fully on-device

            **Requirements: Apple Silicon Mac (M1 or later), macOS 15 (Sequoia) or newer.** Intel Macs are not supported.

            ### Install
            1. Download `Clipmunk.dmg` below.
            2. Open it and drag **Clipmunk** to your Applications folder, then launch it.

            The DMG is signed with an Apple Developer ID certificate and notarized by Apple, so it opens normally — **no Gatekeeper warning and no Terminal workaround.**

            ### First launch
            - On first use Clipmunk downloads **~6 GB of on-device AI models** from Hugging Face (one-time): the Gemma 4 E2B "director", the always-on Marlin-2B vision model, and a transcription model. Keep the app open and make sure you have free disk space.
            - The first video also spends a minute or two optimizing the models for your Mac. **After that, everything runs offline.**
            - Publishing/scheduling to social networks is optional and needs an [Upload-Post](https://upload-post.com) API key.

      - name: Clean up secrets and keychain
        if: always()
        run: |
          # Scrub the decoded cert / notary key / app zip from the runner before it's reused.
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/notary-key.p8" "$RUNNER_TEMP/$APP_NAME.zip" || true
          security delete-keychain "$KEYCHAIN" || true
