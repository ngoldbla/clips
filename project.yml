# XcodeGen project definition for Clipmunk.
# Regenerate the .xcodeproj with:  xcodegen generate
name: Clipmunk
options:
  bundleIdPrefix: com.github.ngoldbla
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  # Vendored: native Gemma 4 multimodal inference (MIT). Source lives in Vendor/.
  # Pulls in mlx-swift, mlx-swift-lm, swift-transformers transitively.
  Gemma4Swift:
    path: Vendor/gemma-4-swift-mlx
  # Qwen 3.5 9B (the "Director" that finds viral moments from a transcript).
  # Same MLX stack Gemma4Swift already resolves — declaring the products here
  # just makes them linkable from the app target. Do NOT pin mlx-swift directly:
  # let it stay transitive so it respects Gemma's 0.31.3 floor (single source).
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: "0.9.0"
  # WhisperKit caps swift-transformers at <1.2.0; Gemma only needs >=1.1.6, so
  # 1.1.x satisfies the whole graph. (mlx-swift-lm doesn't depend on it at all.)
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.1.6"
  # On-device transcription. WhisperKit is now the FALLBACK STT (Parakeet is the
  # default on constrained Macs); still the non-English path. Bumped 0.9 -> 1.0
  # because speech-swift requires WhisperKit >= 1.0.0 (disjoint with 0.9.x).
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "1.0.0"
  # Parakeet TDT (STT) + Kokoro-82M (TTS) as CoreML/ANE via one package
  # (internally "Qwen3Speech"). Pinned exact: it ships no upstream Package.resolved,
  # so this is the only way to keep the resolved graph reproducible. We import only
  # ParakeetStreamingASR + KokoroTTS + AudioCommon.
  speech-swift:
    url: https://github.com/soniqo/speech-swift
    exactVersion: "0.0.20"

targets:
  Clipmunk:
    type: application
    platform: macOS
    sources:
      - path: Clipmunk
    dependencies:
      - package: Gemma4Swift
        product: Gemma4Swift
      - package: mlx-swift-lm
        product: MLXVLM         # VLMModelFactory — Qwen 3.5 9B is a VLM package
      - package: mlx-swift-lm
        product: MLXLMCommon     # ChatSession, GenerateParameters, ModelContainer
      - package: mlx-swift-lm
        product: MLXHuggingFace  # #hubDownloader(), #huggingFaceTokenizerLoader()
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
      - package: WhisperKit
        product: WhisperKit
      - package: speech-swift
        product: ParakeetStreamingASR
      - package: speech-swift
        product: KokoroTTS
      - package: speech-swift
        product: AudioCommon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github.ngoldbla.Clipmunk
        PRODUCT_NAME: Clipmunk
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Clipmunk/Info.plist
        DEVELOPMENT_TEAM: XC6FN96MA8
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        DEAD_CODE_STRIPPING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        MACOSX_DEPLOYMENT_TARGET: "15.0"
      configs:
        # Local/dev builds stay unsigned so no certificate is required.
        Debug:
          CODE_SIGNING_ALLOWED: NO
        # Release is the distributable, Developer ID–signed, hardened build.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_ENTITLEMENTS: Clipmunk/Clipmunk.entitlements
          # Do NOT inject get-task-allow — Apple's notary service rejects it.
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"

  # Developer-only probe for the Marlin-2B video VLM (vision-aware moment-finder).
  # Loads Marlin (model_type qwen3_5 + Qwen3VLProcessor) via the *existing*
  # VLMModelFactory and runs its caption/find modes on a (optionally sub-ranged)
  # video. Used to validate loadability + timestamp fidelity before integration.
  marlin-probe:
    type: tool
    platform: macOS
    sources:
      - path: MarlinProbe
    dependencies:
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
    settings:
      base:
        PRODUCT_NAME: marlin-probe
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES

  # Developer-only headless probe for the Director (Gemma 4 E2B). Loads the real
  # MomentFinderService and runs one moment-finding + inline-caption pass over a
  # transcript — no GUI, so it validates model loadability + JSON output from any
  # shell. Pick the model with CLIPMUNK_DIRECTOR_MODEL to A/B unsloth vs standard.
  director-probe:
    type: tool
    platform: macOS
    sources:
      - path: DirectorProbe
      - path: Clipmunk/Services/MomentFinderService.swift
      - path: Clipmunk/Services/ChatModelProfile.swift
      - path: Clipmunk/Services/ModelCatalog.swift
      - path: Clipmunk/Services/MemoryPolicy.swift
      - path: Clipmunk/Services/PromptBuilder.swift
      - path: Clipmunk/Services/JSONVariantParser.swift
      - path: Clipmunk/Models/ClipCandidate.swift
      - path: Clipmunk/Models/PostVariant.swift
      - path: Clipmunk/Models/String+Trimmed.swift
    dependencies:
      - package: Gemma4Swift
        product: Gemma4Swift
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
    settings:
      base:
        PRODUCT_NAME: director-probe
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES

  # Developer-only headless end-to-end shorts pipeline. Runs the REAL app path
  # without the GUI (transcribe → E2B moments+captions → cut → reframe+captions
  # render) and writes finished sample .mp4s — the only way to produce real output
  # videos in a headless shell, since the app's SwiftUI scene needs a window session.
  shorts-probe:
    type: tool
    platform: macOS
    sources:
      - path: ShortsProbe
      - path: Clipmunk/Services/TranscriptionService.swift
      - path: Clipmunk/Services/ASREngine.swift
      - path: Clipmunk/Services/WhisperKitEngine.swift
      - path: Clipmunk/Services/MomentFinderService.swift
      - path: Clipmunk/Services/ChatModelProfile.swift
      - path: Clipmunk/Services/ModelCatalog.swift
      - path: Clipmunk/Services/MemoryPolicy.swift
      - path: Clipmunk/Services/PromptBuilder.swift
      - path: Clipmunk/Services/JSONVariantParser.swift
      - path: Clipmunk/Services/MediaExtractor.swift
      - path: Clipmunk/Services/AudioResampler.swift
      - path: Clipmunk/Services/ParakeetEngine.swift
      - path: Clipmunk/Services/VerticalReframer.swift
      - path: Clipmunk/Services/VideoOverlayRenderer.swift
      - path: Clipmunk/Services/CaptionRenderer.swift
      - path: Clipmunk/Services/AudioActivityAnalyzer.swift
      - path: Clipmunk/Services/CaptionScript.swift
      - path: Clipmunk/Models/ClipCandidate.swift
      - path: Clipmunk/Models/PostVariant.swift
      - path: Clipmunk/Models/WordStamp.swift
      - path: Clipmunk/Models/VideoJob.swift
      - path: Clipmunk/Models/CaptionStyle.swift
      - path: Clipmunk/Models/String+Trimmed.swift
    dependencies:
      - package: Gemma4Swift
        product: Gemma4Swift
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
      - package: WhisperKit
        product: WhisperKit
    settings:
      base:
        PRODUCT_NAME: shorts-probe
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES

  # Developer-only command-line probe. Runs the real generation path
  # (MediaExtractor → Gemma4Engine → JSONVariantParser) headlessly.
  clipmunk-probe:
    type: tool
    platform: macOS
    sources:
      - path: Probe
      - path: Clipmunk/Models/PostVariant.swift
      - path: Clipmunk/Models/VideoJob.swift
      - path: Clipmunk/Models/String+Trimmed.swift
      - path: Clipmunk/Services/MediaExtractor.swift
      - path: Clipmunk/Services/PromptBuilder.swift
      - path: Clipmunk/Services/JSONVariantParser.swift
    dependencies:
      - package: Gemma4Swift
        product: Gemma4Swift
    settings:
      base:
        PRODUCT_NAME: clipmunk-probe
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES
